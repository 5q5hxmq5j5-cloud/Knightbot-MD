<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Flappy Bird — Modular</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game" role="img" aria-label="Flappy Bird game"></canvas>

  <div id="hud" aria-hidden="false">
    <div id="score">0</div>
    <div id="highscore">Best: 0</div>
    <button id="shareBtn" aria-label="Share score">Share</button>
  </div>

  <div id="message">Tap to start</div>
  <div id="credit">Tap anywhere to flap — supports touch & mouse</div>

  <script src="game.js"></script>
</body>
</html>
