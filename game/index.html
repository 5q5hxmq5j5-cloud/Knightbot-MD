<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Flappy Bird — Single File (Standalone)</title>
  <style>
    :root{
      --bg:#70c5ce;
      --ground:#d18b3b;
      --pipe:#2ea44f;
      --ui-bg:rgba(0,0,0,0.35);
      --text:#fff;
    }
    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #game{
      display:block;
      width: min(420px, 94vw);
      height: auto;
      max-height: 92vh;
      margin: calc(env(safe-area-inset-top, 20px)) auto;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      background: linear-gradient(#70c5ce,#9ee0f2);
      -webkit-user-select: none;
      user-select: none;
    }
    /* HUD */
    #hud{
      position: fixed;
      left: 0;
      right: 0;
      top: 6vh;
      display:flex;
      gap:12px;
      justify-content:center;
      pointer-events: none;
      align-items: center;
    }
    #score{
      pointer-events: none;
      font-weight:700;
      color:var(--text);
      background:var(--ui-bg);
      padding:8px 14px;
      border-radius:20px;
      font-size:18px;
      box-shadow:0 2px 6px rgba(0,0,0,0.2);
    }
    #highscore{
      pointer-events: none;
      font-weight:700;
      color:var(--text);
      background:var(--ui-bg);
      padding:8px 14px;
      border-radius:20px;
      font-size:14px;
      box-shadow:0 2px 6px rgba(0,0,0,0.2);
      opacity:0.95;
    }
    #message{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 10vh;
      background: var(--ui-bg);
      color: var(--text);
      padding:10px 16px;
      border-radius:10px;
      font-size:16px;
      pointer-events: none;
      box-shadow:0 2px 6px rgba(0,0,0,0.2);
      max-width: 90vw;
      text-align: center;
    }
    /* small helper for footer credit */
    #credit{
      position: fixed;
      left: 0;
      right: 0;
      bottom: 2vh;
      text-align: center;
      font-size:12px;
      color: rgba(255,255,255,0.9);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game" role="img" aria-label="Flappy Bird game"></canvas>
  <div id="hud" aria-hidden="false">
    <div id="score">0</div>
    <div id="highscore">Best: 0</div>
  </div>
  <div id="message">Tap to start</div>
  <div id="credit">Tap anywhere to flap — supports touch & mouse</div>

  <script>
  // Single-file Flappy Bird clone with persistent high score (localStorage)
  (function(){
    const STORAGE_KEY = 'flappy_highscore_v1';

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: false });
    const scoreEl = document.getElementById('score');
    const highEl = document.getElementById('highscore');
    const messageEl = document.getElementById('message');

    // responsive canvas
    function resizeCanvas(){
      const displayWidth = Math.min(window.innerWidth, 420);
      const displayHeight = Math.min(window.innerHeight - 20, Math.round(displayWidth * 1.6));
      canvas.style.width = displayWidth + 'px';
      canvas.style.height = displayHeight + 'px';
      const DPR = Math.max(window.devicePixelRatio || 1, 1);
      canvas.width = Math.floor(displayWidth * DPR);
      canvas.height = Math.floor(displayHeight * DPR);
      ctx.setTransform(DPR,0,0,DPR,0,0);
    }
    window.addEventListener('resize', resizeCanvas, { passive: true });
    resizeCanvas();

    // game constants
    let W = parseInt(canvas.style.width);
    let H = parseInt(canvas.style.height);
    const groundHeight = 80;
    const gravity = 0.45;
    const flapStrength = -8.5;
    const pipeWidth = 60;
    const pipeGapMin = 120;
    const pipeGapExtra = 70;
    const pipeSpawnInterval = 1500;
    let pipeSpeed = 2.6;

    // state
    let state = 'menu';
    let bird = null;
    let pipes = [];
    let lastPipeTime = 0;
    let score = 0;
    let highscore = 0;
    let lastTime = performance.now();

    function loadHighscore(){
      try{
        const v = localStorage.getItem(STORAGE_KEY);
        highscore = v ? parseInt(v,10) || 0 : 0;
      }catch(e){ highscore = 0; }
      updateHUD();
    }
    function saveHighscore(){
      try{ localStorage.setItem(STORAGE_KEY, String(highscore)); }catch(e){}
    }

    function resetGame(){
      W = parseInt(canvas.style.width);
      H = parseInt(canvas.style.height);
      bird = { x: Math.round(W * 0.28), y: Math.round(H * 0.45), r: Math.max(10, Math.round(W * 0.045)), vy:0, rotation:0 };
      pipes = [];
      lastPipeTime = performance.now();
      score = 0;
      pipeSpeed = 2.6;
      state = 'menu';
      updateHUD();
      messageEl.textContent = 'Tap to start';
    }

    function spawnPipe(){
      const gap = pipeGapMin + Math.random() * pipeGapExtra;
      const margin = 40 + Math.round(bird.r);
      const topHeight = margin + Math.random() * Math.max(0,(H - groundHeight - gap - margin * 2));
      pipes.push({ x: W + 10, w: pipeWidth, top: Math.round(topHeight), gap: Math.round(gap), passed: false });
    }

    function flap(){
      if(state === 'menu'){
        state = 'playing';
        bird.vy = flapStrength;
        lastPipeTime = performance.now();
        messageEl.textContent = '';
      }else if(state === 'playing'){
        bird.vy = flapStrength;
      }else if(state === 'dead'){
        resetGame();
      }
    }

    function onPointerDown(e){ if (e.cancelable) e.preventDefault(); flap(); }
    window.addEventListener('touchstart', onPointerDown, { passive: false });
    window.addEventListener('mousedown', onPointerDown, { passive: false });
    window.addEventListener('pointerdown', onPointerDown, { passive: false });

    function die(){
      state = 'dead';
      // update highscore
      if(score > highscore){ highscore = score; saveHighscore(); }
      messageEl.textContent = 'Game over — tap to restart';
      updateHUD();
    }

    function rectCircleColliding(rx, ry, rw, rh, cx, cy, cr){
      const closestX = Math.max(rx, Math.min(cx, rx+rw));
      const closestY = Math.max(ry, Math.min(cy, ry+rh));
      const dx = cx - closestX; const dy = cy - closestY;
      return (dx*dx + dy*dy) < (cr*cr);
    }

    function update(delta){
      if(state === 'playing'){
        bird.vy += gravity;
        bird.y += bird.vy;
        bird.rotation = Math.max(-0.6, Math.min(1.2, bird.vy / 10));

        for(let p of pipes){ p.x -= pipeSpeed; if(!p.passed && p.x + p.w < bird.x){ p.passed = true; score++; if(score % 5 === 0) pipeSpeed += 0.2; updateHUD(); } }
        pipes = pipes.filter(p => p.x + p.w > -20);
        if(performance.now() - lastPipeTime > pipeSpawnInterval){ spawnPipe(); lastPipeTime = performance.now(); }

        // collisions
        if(bird.y - bird.r < 0 || bird.y + bird.r > H - groundHeight){ die(); return; }
        for(let p of pipes){
          if(rectCircleColliding(p.x, 0, p.w, p.top, bird.x, bird.y, bird.r)){ die(); return; }
          if(rectCircleColliding(p.x, p.top + p.gap, p.w, H - groundHeight - (p.top + p.gap), bird.x, bird.y, bird.r)){ die(); return; }
        }
      }else if(state === 'menu'){
        bird.rotation = Math.sin(performance.now() / 300) * 0.08;
      }else if(state === 'dead'){
        if(bird.y + bird.r < H - groundHeight){ bird.vy += gravity; bird.y += bird.vy; bird.rotation = Math.min(1.2, bird.rotation + 0.05); }
      }
    }

    function draw(){
      ctx.fillStyle = '#70c5ce'; ctx.fillRect(0,0,W,H);
      for(let p of pipes){
        ctx.fillStyle = '#2ea44f'; ctx.fillRect(p.x, 0, p.w, p.top);
        ctx.fillRect(p.x, p.top + p.gap, p.w, H - groundHeight - (p.top + p.gap));
        ctx.fillStyle = '#237a37'; ctx.fillRect(p.x - 4, p.top - 8, p.w + 8, 8);
        ctx.fillRect(p.x - 4, p.top + p.gap, p.w + 8, 8);
      }
      // ground
      ctx.fillStyle = '#d18b3b'; ctx.fillRect(0, H - groundHeight, W, groundHeight);
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      for(let i=0;i<20;i++){ const x = (i * 50 + (performance.now() / 30) % 50); ctx.fillRect(x, H - groundHeight + 10, 30, 6); }
      // bird
      ctx.save(); ctx.translate(bird.x, bird.y); ctx.rotate(bird.rotation);
      ctx.fillStyle = '#ffd54a'; ctx.beginPath(); ctx.arc(0,0,bird.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffb74d'; ctx.beginPath(); ctx.ellipse(-bird.r * 0.1, bird.r * 0.1, bird.r * 0.55, bird.r * 0.35, -0.6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(bird.r * 0.35, -bird.r * 0.2, Math.max(2, bird.r * 0.18), 0, Math.PI*2); ctx.fill(); ctx.restore();
    }

    function updateHUD(){ scoreEl.textContent = score; highEl.textContent = 'Best: ' + highscore; if(state === 'menu'){ messageEl.textContent = 'Tap to start'; } else if(state === 'playing'){ messageEl.textContent = ''; } else if(state === 'dead'){ messageEl.textContent = 'Game over — tap to restart'; } }

    function gameLoop(now){ const delta = Math.min(40, now - lastTime); lastTime = now; const newW = parseInt(canvas.style.width); const newH = parseInt(canvas.style.height); if(newW !== W || newH !== H){ W = newW; H = newH; bird.x = Math.round(W * 0.28); bird.y = Math.min(bird.y, H - groundHeight - bird.r - 2); }
      update(delta); draw(); requestAnimationFrame(gameLoop); }

    // init
    loadHighscore(); resetGame(); requestAnimationFrame(gameLoop);
  })();
  </script>
</body>
</html>
